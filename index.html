<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIS TESTS - Mejorado</title>
    <!-- Enlace a Font Awesome para los iconos (papelera, etc.) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Enlace a tu archivo CSS -->
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <div class="container">
        <h1>MIS TESTS</h1>

        <div class="input-section">
            <h2>Añadir Nuevo Ítem</h2>
            <div class="form-group">
                <div class="flex-grow-1">
                    <label for="numero">Número</label>
                    <input type="number" id="numero" placeholder="Ej: 1">
                </div>
                <div class="flex-grow-1">
                    <label for="titulo">Título</label>
                    <input type="text" id="titulo" placeholder="Ej: Prueba de Usuario">
                </div>
                <div class="flex-grow-1">
                    <label for="valor">Valor</label>
                    <input type="text" id="valor" placeholder="Ej: Dato adicional">
                </div>
                <button id="addItemButton">Añadir Ítem</button>
            </div>
            <div id="messageBox" class="message"></div>
        </div>

        <div class="table-section">
            <h2>Ítems de Prueba</h2>
            <div class="table-container">
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Título</th>
                            <th>Valor</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Aquí se añadirán las filas de la tabla mediante JavaScript -->
                    </tbody>
                </table>
            </div>
            <button id="clearAllButton">Limpiar Todo</button>
        </div>

        <div class="json-section">
            <div class="json-header">
                <h2>Resultados JSON</h2>
                <button id="copyJsonButton">Copiar JSON</button>
            </div>
            <pre id="jsonOutput"></pre>
        </div>
    </div>

    <!-- Enlace a tu archivo JavaScript -->
    <script src="ui.js"></script>
</body>
</html>
