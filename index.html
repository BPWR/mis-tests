<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tests Dinámico</title>
    <!-- Enlace a Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Enlace a tu archivo CSS -->
    <link rel="stylesheet" href="ui.css">
</head>
<body>
    <header>
        <h1>Mis Tests Dinámicos</h1>
    </header>

    <main id="app-container" class="container">
        <!-- Aquí se cargarán dinámicamente la lista de tests o las preguntas del test -->
        <section id="test-list-section" class="test-list-grid">
            <!-- Las tarjetas de los tests se insertarán aquí por JavaScript -->
            <h2>Selecciona un Test</h2>
            <div id="test-cards-container" class="grid-container">
                <!-- Tarjetas de tests -->
            </div>
        </section>

        <section id="quiz-section" class="quiz-container" style="display: none;">
            <!-- Aquí se mostrará el test seleccionado -->
            <h2 id="quiz-title"></h2>
            <div id="question-container">
                <!-- Las preguntas se cargarán aquí -->
            </div>
            <div id="quiz-navigation" class="quiz-navigation">
                <button id="prev-question" class="nav-button" style="display: none;">Anterior</button>
                <button id="next-question" class="nav-button" style="display: none;">Siguiente</button>
                <button id="submit-quiz" class="submit-button" style="display: none;">Finalizar Test</button>
            </div>
            <div id="quiz-result" class="result-container" style="display: none;">
                <!-- Resultados del test -->
            </div>
             <button id="back-to-list" class="back-button" style="display: none;">Volver a la Lista de Tests</button>
        </section>
    </main>

    <!-- Tus scripts JavaScript -->
    <script src="reader.js"></script>
    <script src="parser.js"></script> <!-- De momento vacío, pero lo conservamos -->
    <script src="ui.js"></script>
</body>
</html>
