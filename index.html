<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Tests Dinámico</title>
    <!-- Enlace a Font Awesome para los iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Enlace a tu archivo CSS -->
    <link rel="stylesheet" href="ui.css">

    <!-- Librería para convertir DOCX a HTML/Texto (comentada si solo usas TXT) -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/mammoth.js/1.6.0/mammoth.browser.min.js"></script> -->
    
    <!-- Librerías para convertir PDF a Texto (comentadas si solo usas TXT) -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.min.mjs" type="module"></script> -->
    <!-- <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.0.379/pdf.worker.min.mjs" type="module"></script> -->
</head>
<body>
    <header>
        <h1>Mis Tests Dinámicos</h1>
    </header>

    <main id="app-container" class="container">
        <!-- Selector de Modo de Test AÑADIDO AQUÍ -->
        <section id="test-mode-selector" class="mode-selector-container">
            <h2>Selecciona un Modo de Test</h2>
            <div class="mode-buttons">
                <button id="mode-examen" class="mode-button selected" data-mode="examen">
                    <i class="fas fa-file-alt"></i> Modo Examen
                </button>
                <button id="mode-estudio" class="mode-button" data-mode="estudio">
                    <i class="fas fa-book-reader"></i> Modo Estudio
                </button>
            </div>
        </section>

        <section id="test-list-section" class="test-list-grid">
            <h2>Selecciona un Test</h2>
            <div id="test-cards-container" class="grid-container">
                <!-- Tarjetas de tests -->
            </div>
            <div id="loading-message" style="display: none; text-align: center; margin-top: 20px;">
                <p>Cargando tests disponibles...</p>
                <i class="fas fa-spinner fa-spin fa-2x" style="color: #3498db;"></i>
            </div>
        </section>

        <section id="quiz-section" class="quiz-container" style="display: none;">
            <h2 id="quiz-title"></h2>
            <div id="question-container">
                <!-- Las preguntas se cargarán aquí -->
            </div>
            <div id="quiz-navigation" class="quiz-navigation">
                <button id="prev-question" class="nav-button" style="display: none;">Anterior</button>
                <button id="next-question" class="nav-button" style="display: none;">Siguiente</button>
                <button id="submit-quiz" class="submit-button" style="display: none;">Finalizar Test</button>
            </div>
            <div id="quiz-result" class="result-container" style="display: none;">
                <!-- Resultados del test -->
            </div>
             <button id="back-to-list" class="back-button" style="display: none;">Volver a la Lista de Tests</button>
        </section>
    </main>

    <!-- Tus scripts JavaScript -->
    <!-- Importación de módulos: el orden es importante para las dependencias -->
    <script src="parser.js" type="module"></script> 
    <script src="reader.js" type="module"></script> 
    <script src="ui.js" type="module"></script> 
</body>
</html>
